<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ────────────────────────────────────────────────── -->
    <title>Suraj Singh Chauhan | Data & Research Analyst</title>
    <meta name="description" content="Portfolio of Suraj Singh Chauhan — BCA Graduate and aspiring Data Analyst skilled in Python, Power BI, Excel, and data visualization. Open to entry-level roles." />
    <meta name="keywords" content="data analyst, research analyst, python, power bi, excel, data visualization, BCA, Haldwani, portfolio" />
    <meta name="author" content="Suraj Singh Chauhan" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (LinkedIn/WhatsApp previews) ────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Suraj Singh Chauhan | Data & Research Analyst" />
    <meta property="og:description" content="BCA Graduate skilled in Python, Power BI, and data visualization. Open to entry-level Data Analyst roles." />
    <meta property="og:url"         content="https://surajchauhan.dev" />

    <!-- ── Favicon ────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon"  href="/favicon.ico" />

    <!-- ── Fonts (single request — CSS @import removed from index.css) ── -->
    <!-- preconnect cuts DNS + TLS handshake time -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Single combined request for all weights needed -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Theme colour (browser UI on mobile) ─────────────────── -->
    <meta name="theme-color" content="#000000" />
  </head>

  <body class="bg-black text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
